name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test --coverage
      - run: bun run build
      - run: bunx publint
      - run: bunx attw --pack . --profile esm-only
      - run: bun scripts/check-hygiene.mjs

  node-smoke:
    # dist must stay runnable under plain Node (package targets both runtimes)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: node dist/cli/main.js --help
      - run: node -e "import('./dist/index.js').then(m => { if (!m.classifierConfigSchema) throw new Error('bad barrel') })"
